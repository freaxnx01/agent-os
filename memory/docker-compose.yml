# Default: only mem0-mcp (uses external postgres + ollama via POSTGRES_URL / OLLAMA_URL).
# Standalone mode (all-in-one for dev): docker compose --profile standalone up -d

services:
  postgres-memory:
    profiles: [standalone]
    image: pgvector/pgvector:pg17
    container_name: memory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mem0
      POSTGRES_USER: mem0
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mem0 -d mem0"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    profiles: [standalone]
    image: ollama/ollama:latest
    container_name: memory-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  ollama-init:
    profiles: [standalone]
    image: ollama/ollama:latest
    container_name: memory-ollama-init
    restart: on-failure
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama pull nomic-embed-text
        ollama pull llama3.2:3b
        echo "Models ready."

  mem0-mcp:
    build:
      context: ./mem0-mcp
    container_name: memory-mem0-mcp
    restart: unless-stopped
    environment:
      POSTGRES_URL: ${POSTGRES_URL:-postgresql://mem0:${POSTGRES_PASSWORD}@postgres-memory:5432/mem0}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      LLM_MODEL: ${LLM_MODEL:-llama3.2:3b}
      MCP_PORT: "8765"
    ports:
      - "0.0.0.0:8765:8765"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8765/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
    name: memory_postgres_data
  ollama_data:
    name: memory_ollama_data
